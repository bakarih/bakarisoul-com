name: Suggest a Feature
description: Have an idea?
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why would this help? (optional)
    validations:
      required: false
